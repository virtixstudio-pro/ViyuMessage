name: Build APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download and Force Install Gradle 8.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip -q gradle-8.4-bin.zip
        sudo mv gradle-8.4 /opt/gradle
        sudo ln -sf /opt/gradle/bin/gradle /usr/bin/gradle
        gradle -v

    - name: Build Debug APK directly
      run: gradle assembleDebug --stacktrace

    - name: Locate and Upload APK
      run: |
        find . -name "*.apk"
        APK_PATH=$(find . -name "*-debug.apk" | head -n 1)
        if [ -z "$APK_PATH" ]; then
          APK_PATH=$(find . -name "*.apk" | head -n 1)
        fi
        echo "APK_FOUND=$APK_PATH" >> $GITHUB_ENV
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: ${{ env.APK_FOUND }}
